apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-detection-frontend
  namespace: bot-detection
  labels:
    app: bot-detection-frontend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bot-detection-frontend
  template:
    metadata:
      labels:
        app: bot-detection-frontend
    spec:
      containers:
      - name: frontend
        image: bot-detection:frontend-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        env:
        - name: REACT_APP_API_URL
          value: "http://bot-detection-backend-service:8000"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - bot-detection-frontend
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: bot-detection-frontend-service
  namespace: bot-detection
  labels:
    app: bot-detection-frontend
spec:
  type: LoadBalancer
  selector:
    app: bot-detection-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http